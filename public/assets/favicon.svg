<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a6bb5"/>
      <stop offset="100%" stop-color="#0d4f8a"/>
    </linearGradient>
  </defs>

  <!-- Rounded background with gradient -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>

  <!-- Clipboard body -->
  <rect x="8" y="8" width="16" height="19" rx="2.5" fill="white" opacity="0.95"/>

  <!-- Clipboard clip -->
  <rect x="12" y="5.5" width="8" height="4" rx="1.5" fill="white"/>
  <rect x="13.5" y="6.5" width="5" height="2" rx="1" fill="#1a6bb5"/>

  <!-- Checklist lines -->
  <!-- Row 1: check + line -->
  <path d="M10.5 14 L12 15.5 L14 12.5" stroke="#16a34a" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="15.5" y="13" width="6" height="1.4" rx="0.7" fill="#1a6bb5" opacity="0.35"/>

  <!-- Row 2: check + line -->
  <path d="M10.5 18.5 L12 20 L14 17" stroke="#16a34a" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="15.5" y="17.5" width="6" height="1.4" rx="0.7" fill="#1a6bb5" opacity="0.35"/>

  <!-- Row 3: empty circle + line -->
  <circle cx="12.2" cy="23" r="1.5" stroke="#94a3b8" stroke-width="1.1" fill="none"/>
  <rect x="15.5" y="22.2" width="6" height="1.4" rx="0.7" fill="#1a6bb5" opacity="0.2"/>
</svg>
