<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Blue rounded background -->
  <rect width="32" height="32" rx="7" fill="#1a6bb5"/>

  <!-- Vertical pole -->
  <rect x="15" y="7" width="2" height="19" rx="1" fill="white"/>

  <!-- Base/foot -->
  <rect x="10" y="25.5" width="12" height="2" rx="1" fill="white"/>

  <!-- Cross arm -->
  <rect x="6" y="10" width="20" height="2" rx="1" fill="white"/>

  <!-- Pivot circle at crossbar center -->
  <circle cx="16" cy="11" r="2" fill="#1a6bb5"/>
  <circle cx="16" cy="11" r="1" fill="white"/>

  <!-- Left chain -->
  <line x1="7.5" y1="12" x2="7.5" y2="17" stroke="white" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Right chain -->
  <line x1="24.5" y1="12" x2="24.5" y2="17" stroke="white" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Left pan (bowl arc curving downward) -->
  <path d="M4.5 17 Q7.75 21 11 17" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Right pan -->
  <path d="M21 17 Q24.25 21 27.5 17" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>
