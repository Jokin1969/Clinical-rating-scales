<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="appTitle">Escalas de Valoración Clínica</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="app-header">
    <h1 class="app-title" data-i18n="appTitle">Escalas de Valoración Clínica</h1>
    <div class="lang-selector">
      <button class="lang-btn" data-lang="es" title="Español">🇪🇸</button>
      <button class="lang-btn" data-lang="en" title="English">🇬🇧</button>
      <button class="lang-btn" data-lang="de" title="Deutsch">🇩🇪</button>
      <button class="lang-btn" data-lang="it" title="Italiano">🇮🇹</button>
    </div>
  </header>

  <!-- ===== LOGO BAR ===== -->
  <div class="logo-bar">
    <img src="/assets/logo-osakidetza.png" alt="Osakidetza" class="logo-img" />
    <img src="/assets/logo-cicbiogune.png" alt="CIC bioGUNE" class="logo-img" />
  </div>

  <!-- ===== VIEWS ===== -->

  <!-- VIEW: LANDING -->
  <div id="view-landing" class="view active">
    <div class="container">
      <h2 class="section-title landing-title" data-i18n="selectMode">Seleccione el tipo de evaluación</h2>
      <div class="landing-grid">
        <button id="btn-symptomatic" class="mode-card">
          <span class="mode-card__icon">🩺</span>
          <span class="mode-card__title" data-i18n="symptomatic">Sintomático</span>
          <span class="mode-card__desc" data-i18n="symptomaticDesc">Con sintomatología activa</span>
        </button>
        <button id="btn-asymptomatic" class="mode-card">
          <span class="mode-card__icon">💚</span>
          <span class="mode-card__title" data-i18n="asymptomatic">Asintomático</span>
          <span class="mode-card__desc" data-i18n="asymptomaticDesc">Sin sintomatología</span>
        </button>
      </div>
    </div>
  </div>

  <!-- VIEW: HOME -->
  <div id="view-home" class="view">
    <div class="container">
      <div class="mode-bar">
        <button id="btn-back-landing" class="btn btn-outline btn-sm">&#8592; <span data-i18n="backToSelection">Cambiar selección</span></button>
        <span class="mode-bar__label" id="mode-bar-label">🩺 <span id="mode-bar-text">Sintomático</span></span>
      </div>
      <div class="patient-code-box card">
        <label for="patient-code" class="label" data-i18n="patientCode">Código de Paciente</label>
        <div class="input-row">
          <input type="text" id="patient-code" class="input-code"
            data-i18n-placeholder="patientCodePlaceholder"
            placeholder="Ingrese el código del paciente"
            autocomplete="off" />
          <button id="btn-load-code" class="btn btn-secondary" data-i18n="loadCode">Cargar</button>
        </div>
        <p class="code-hint" data-i18n="codeHint">Introduce el código para desbloquear las escalas.</p>
        <p id="code-status" class="code-status"></p>
      </div>

      <h2 class="section-title" data-i18n="selectScale">Seleccione una escala clínica</h2>

      <div class="scales-grid">
        <button class="scale-btn disabled" data-scale="MRC">
          <span class="scale-abbr">MRC</span>
          <span class="scale-name" data-i18n="scaleName_MRC">Modified Ranking for Caregivers</span>
          <span class="scale-questions" data-i18n-count="MRC">11 preguntas</span>
          <span class="scale-score"></span>
        </button>
        <button class="scale-btn disabled" data-scale="SARA">
          <span class="scale-abbr">SARA</span>
          <span class="scale-name" data-i18n="scaleName_SARA">Scale for the Assessment and Rating of Ataxia</span>
          <span class="scale-questions" data-i18n-count="SARA">8 preguntas</span>
          <span class="scale-score"></span>
        </button>
        <button class="scale-btn disabled" data-scale="NPI">
          <span class="scale-abbr">NPI</span>
          <span class="scale-name" data-i18n="scaleName_NPI">Neuropsychiatric Inventory</span>
          <span class="scale-questions" data-i18n-count="NPI">7 preguntas</span>
          <span class="scale-score"></span>
        </button>
        <button class="scale-btn disabled" data-scale="BISAD">
          <span class="scale-abbr">BISAD</span>
          <span class="scale-name" data-i18n="scaleName_BISAD">Behavioral Indicators of Somatic Anxiety</span>
          <span class="scale-questions" data-i18n-count="BISAD">8 preguntas</span>
          <span class="scale-score"></span>
        </button>
        <button class="scale-btn disabled" data-scale="IQCODE">
          <span class="scale-abbr">IQCODE</span>
          <span class="scale-name" data-i18n="scaleName_IQCODE">Informant Questionnaire on Cognitive Decline</span>
          <span class="scale-questions" data-i18n-count="IQCODE">7 preguntas</span>
          <span class="scale-score"></span>
        </button>
        <button class="scale-btn disabled" data-scale="RBD1Q">
          <span class="scale-abbr">RBD1Q</span>
          <span class="scale-name" data-i18n="scaleName_RBD1Q">RBD Single Question Screen</span>
          <span class="scale-questions" data-i18n-count="RBD1Q">1 pregunta</span>
          <span class="scale-score"></span>
        </button>
        <button class="scale-btn disabled" data-scale="MBIC">
          <span class="scale-abbr">MBI-C</span>
          <span class="scale-name" data-i18n="scaleName_MBIC">Mild Behavioral Impairment Checklist</span>
          <span class="scale-questions" data-i18n-count="MBIC">34 preguntas</span>
          <span class="scale-score"></span>
        </button>
        <button class="scale-btn disabled" data-scale="HADS">
          <span class="scale-abbr">HADS</span>
          <span class="scale-name" data-i18n="scaleName_HADS">Hospital Anxiety and Depression Scale</span>
          <span class="scale-questions" data-i18n-count="HADS">14 preguntas</span>
          <span class="scale-score"></span>
        </button>
        <button class="scale-btn disabled" data-scale="PSQI">
          <span class="scale-abbr">PSQI</span>
          <span class="scale-name" data-i18n="scaleName_PSQI">Pittsburgh Sleep Quality Index</span>
          <span class="scale-questions" data-i18n-count="PSQI">18 preguntas</span>
          <span class="scale-score"></span>
        </button>
        <button class="scale-btn disabled" data-scale="CFI">
          <span class="scale-abbr">CFI</span>
          <span class="scale-name" data-i18n="scaleName_CFI">Cognitive Function Instrument</span>
          <span class="scale-questions" data-i18n-count="CFI">28 preguntas</span>
          <span class="scale-score"></span>
        </button>
        <button class="scale-btn disabled" data-scale="FAQ">
          <span class="scale-abbr">FAQ</span>
          <span class="scale-name" data-i18n="scaleName_FAQ">Functional Activities Questionnaire</span>
          <span class="scale-questions" data-i18n-count="FAQ">10 preguntas</span>
          <span class="scale-score"></span>
        </button>
      </div>

      <div id="full-report-row" class="full-report-row" style="display:none">
        <button id="btn-full-report" class="btn btn-full-report" data-i18n="fullReport">Informe Completo</button>
      </div>
    </div>
  </div>

  <!-- VIEW: QUESTIONNAIRE -->
  <div id="view-questionnaire" class="view">
    <div class="container">

      <div class="patient-info-bar">
        <span><span data-i18n="patientCode">Código de Paciente</span>: <strong id="questionnaire-patient-code"></strong></span>
        <button id="btn-back-to-menu" class="btn btn-outline btn-sm">&#8592; <span data-i18n="backToMenu">Volver al Menú</span></button>
      </div>

      <div class="question-header card">
        <div class="question-meta">
          <span id="scale-label" class="scale-label"></span>
          <span id="question-counter" class="question-counter"></span>
        </div>
        <div class="progress-bar-wrap">
          <div id="progress-bar" class="progress-bar"></div>
        </div>
      </div>

      <div class="question-body card">
        <div class="question-top-row">
          <p id="question-text" class="question-text"></p>
          <button id="btn-help" class="btn-help" aria-label="Ayuda">
            <span>?</span>
          </button>
        </div>
        <div id="responses-list" class="responses-list"></div>
      </div>

      <div class="question-nav">
        <button id="btn-first" class="btn btn-outline" data-i18n="first">Inicio</button>
        <div class="nav-center">
          <button id="btn-prev" class="btn btn-outline" data-i18n="previous">Anterior</button>
          <button id="btn-next" class="btn btn-primary" data-i18n="next">Siguiente</button>
        </div>
        <button id="btn-last" class="btn btn-outline" data-i18n="last">Final</button>
      </div>

      <div class="finish-row">
        <button id="btn-finish" class="btn btn-success disabled" data-i18n="finish">Finalizar</button>
      </div>
    </div>
  </div>

  <!-- VIEW: RESULTS -->
  <div id="view-results" class="view">
    <div class="container">
      <div class="results-card card">
        <div class="results-icon">✓</div>
        <h2 class="results-title" data-i18n="completedTitle">¡Cuestionario completado!</h2>
        <p class="results-subtitle" data-i18n="completedMessage">Ha completado todas las preguntas.</p>
        <div class="results-info">
          <div class="results-row">
            <span data-i18n="patientCode">Código de Paciente</span>
            <strong id="results-patient-code"></strong>
          </div>
          <div class="results-row">
            <span data-i18n="scale">Escala</span>
            <strong id="results-scale-name"></strong>
          </div>
          <div class="score-block">
            <div class="score-label" data-i18n="totalScore">Puntuación Total</div>
            <div id="results-score" class="score-number"></div>
          </div>
        </div>
        <div class="results-action-row">
          <button id="btn-view-report" class="btn btn-outline" data-i18n="viewReport">Ver Informe</button>
          <button id="btn-back-menu" class="btn btn-primary" data-i18n="backToMenu">Volver al Menú</button>
        </div>
      </div>
    </div>
  </div>

  <!-- VIEW: REPORT -->
  <div id="view-report" class="view">
    <div class="container">
      <div class="report-toolbar">
        <button id="btn-report-back" class="btn btn-outline btn-sm">&#8592; <span id="report-back-label">Volver</span></button>
        <button id="btn-report-share" class="btn btn-primary btn-sm">&#9993; <span data-i18n="sendByEmail">Enviar por e-mail</span></button>
      </div>
      <div id="report-paper" class="report-paper"></div>
    </div>
  </div>

  <!-- MODAL: HELP -->
  <div id="modal-help" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h3 data-i18n="help">Ayuda</h3>
        <button id="btn-close-modal" class="btn-icon" aria-label="Cerrar">&#10005;</button>
      </div>
      <div id="modal-help-content" class="modal-content"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="/js/i18n.js"></script>
  <script src="/js/data.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
